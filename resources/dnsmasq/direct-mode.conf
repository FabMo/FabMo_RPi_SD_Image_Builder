# Direct-connection mode configuration
# Used when eth0 is in direct PC connection mode
# Serves DHCP on both AP and ethernet interfaces

# IMPORTANT: Do NOT use bind-dynamic with explicit interface directives
# Instead, use listen-address to specify exact IPs to bind to

# Listen on specific addresses
listen-address=127.0.0.1
listen-address=192.168.42.1
listen-address=192.168.44.1

# AP interface DHCP range
dhcp-range=192.168.42.10,192.168.42.50,255.255.255.0,24h
dhcp-option=option:router,192.168.42.1

# Direct connection (eth0) DHCP range  
dhcp-range=192.168.44.10,192.168.44.50,12h
dhcp-option=3,192.168.44.1
dhcp-option=6,192.168.44.1

# Speed up DHCP for direct connections
dhcp-authoritative
dhcp-rapid-commit

# Act as DNS server for directly connected clients
no-resolv
server=8.8.8.8
server=8.8.4.4