# AP-only mode configuration
# Used when eth0 is connected to a LAN network
# Only serves DHCP on the wireless AP interface

interface=wlan0_ap
bind-dynamic
dhcp-range=192.168.42.10,192.168.42.50,255.255.255.0,24h
dhcp-option=option:router,192.168.42.1

# Explicitly exclude eth0 to prevent serving DHCP on LAN
except-interface=eth0